<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>URL Shortener</h1>
    <p class="subtitle">Paste a long URL, get a short one.</p>

    <form id="shortenForm">
      <input
        type="text"
        id="urlInput"
        placeholder="https://example.com/very-long-url..."
        required
        autocomplete="off"
      />
      <button type="submit">Shorten</button>
    </form>

    <div id="result" class="result hidden">
      <span id="shortUrl"></span>
      <button id="copyBtn" title="Copy to clipboard">
        <svg class="icon icon-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <svg class="icon icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>
    </div>

    <div id="error" class="error hidden"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
